<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludmila Coria | Portfolio</title>
    
    <!-- Tipografías: Plus Jakarta Sans (Google) + Cabinet Grotesk (Fontshare) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --white: #ffffff;
            --violet-main: #4d0099;     /* Violeta sólido y profesional */
            --neon-green: #bdff00;      /* Verde Flúo / Lima */
            --violet-marquee: rgba(77, 0, 153, 0.04); /* Violeta ultra sutil para fondo */
            --font-display: 'Cabinet Grotesk', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition-smooth: cubic-bezier(0.2, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--white);
            color: var(--violet-main);
            font-family: var(--font-sans);
            overflow-x: hidden;
            line-height: 1.3;
        }

        /* 1. MARQUESINA DE FONDO PROFESIONAL */
        .marquee-bg {
            position: fixed;
            top: 20%;
            left: 0;
            width: 100vw;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        .marquee-track {
            display: flex;
            white-space: nowrap;
            font-family: var(--font-display);
            font-size: 16vw; /* Tamaño gigante pero sutil */
            font-weight: 900;
            color: var(--violet-marquee);
            will-change: transform;
            animation: marquee-scroll 20s linear infinite;
        }

        @keyframes marquee-scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* 2. CONTENEDOR HERO */
        .hero {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 60px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* FOTO ASIMÉTRICA */
        .photo-box {
            position: relative;
            width: 180px;
            height: 220px;
            margin-bottom: 40px;
            background: var(--violet-main);
            border-radius: 40px 100px 30px 80px;
            overflow: hidden;
            transform: rotate(-4deg);
            will-change: transform;
            transition: transform 0.4s var(--transition-smooth);
            
            /* Animación de entrada */
            opacity: 0;
            animation: entryEffect 1.2s var(--transition-smooth) forwards;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            opacity: 0.85;
        }

        /* Interacción Táctil (Feedback Mobile) */
        .photo-box:active {
            transform: scale(0.94) rotate(2deg);
        }

        /* TÍTULO - NOMBRE LIMPIO */
        .hero-name {
            font-family: var(--font-display);
            font-size: 4.8rem;
            color: var(--violet-main);
            line-height: 0.8;
            text-transform: uppercase;
            letter-spacing: -4px;
            margin-bottom: 32px;
            
            opacity: 0;
            transform: translateY(40px);
            animation: entryEffect 1s var(--transition-smooth) 0.3s forwards;
        }

        /* BLOQUES DE COLOR (HIGHLIGHTS) */
        .tag-block {
            display: inline-block;
            background-color: var(--neon-green);
            color: var(--violet-main);
            padding: 4px 10px;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            border-radius: 2px; /* Cuadrado limpio */
            margin: 2px 0;
        }

        /* BIOGRAFÍA */
        .hero-bio {
            max-width: 320px;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--violet-main);
            
            opacity: 0;
            transform: translateY(30px);
            animation: entryEffect 1s var(--transition-smooth) 0.6s forwards;
        }

        /* ANIMACIÓN DE ENTRADA GENERAL */
        @keyframes entryEffect {
            to {
                opacity: 1;
                transform: translateY(0) rotate(var(--rot, -4deg));
            }
        }

        /* Reset de rotación para textos */
        .hero-name, .hero-bio { --rot: 0deg; }
        .photo-box { --rot: -4deg; }

        /* Ajustes para pantallas pequeñas (iPhone SE / etc) */
        @media (max-width: 375px) {
            .hero-name { font-size: 4rem; }
            .photo-box { width: 160px; height: 200px; }
        }
    </style>
</head>
<body>

    <!-- Marquesina de Fondo Sutil -->
    <div class="marquee-bg">
        <div class="marquee-track">
            <span>CREATIVA DIGITAL • LUDMILA CORIA •&nbsp;</span>
            <span>CREATIVA DIGITAL • LUDMILA CORIA •&nbsp;</span>
            <span>CREATIVA DIGITAL • LUDMILA CORIA •&nbsp;</span>
            <span>CREATIVA DIGITAL • LUDMILA CORIA •&nbsp;</span>
        </div>
    </div>

    <!-- Sección Hero -->
    <section class="hero">
        
        <!-- Foto Interactiva -->
        <div class="photo-box">
            <!-- Reemplazar con tu foto real -->
            <img src="https://via.placeholder.com/400x500/4d0099/ffffff?text=LUDMILA" alt="Ludmila Coria">
        </div>

        <!-- Nombre Principal -->
        <h1 class="hero-name">
            Ludmila<br>
            Coria
        </h1>

        <!-- Bio con bloques de color -->
        <p class="hero-bio">
            Estudiante de Diseño Gráfico, dedicada al 
            <span class="tag-block">Diseño Web UX/UI</span>, 
            <span class="tag-block">Branding</span> y 
            <span class="tag-block">Creación de Contenido</span> digital.
        </p>

    </section>

</body>
</html>
