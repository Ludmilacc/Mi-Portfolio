<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludmila Coria | Portfolio</title>
    
    <!-- Tipografías: Plus Jakarta Sans (Google) + Cabinet Grotesk (Fontshare) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --white: #ffffff;
            --violet-main: #4d0099;
            --neon-green: #bdff00;
            --violet-marquee: rgba(77, 0, 153, 0.04);
            --font-display: 'Cabinet Grotesk', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition-smooth: cubic-bezier(0.2, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--white);
            color: var(--violet-main);
            font-family: var(--font-sans);
            overflow-x: hidden;
            line-height: 1.3;
            /* Altura extra para probar el scroll y ver el menú */
            min-height: 200vh; 
        }

        /* 1. MARQUESINA DE FONDO */
        .marquee-bg {
            position: fixed;
            top: 20%;
            left: 0;
            width: 100vw;
            z-index: 1;
            pointer-events: none;
        }

        .marquee-track {
            display: flex;
            white-space: nowrap;
            font-family: var(--font-display);
            font-size: 16vw;
            font-weight: 900;
            color: var(--violet-marquee);
            animation: marquee-scroll 25s linear infinite;
        }

        @keyframes marquee-scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* 2. SECCIÓN HERO */
        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .photo-box {
            position: relative;
            width: 180px;
            height: 220px;
            margin-bottom: 40px;
            background: var(--violet-main);
            border-radius: 40px 100px 30px 80px;
            overflow: hidden;
            transform: rotate(-4deg);
            transition: transform 0.4s var(--transition-smooth);
            opacity: 0;
            animation: entryEffect 1.2s var(--transition-smooth) forwards;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            opacity: 0.85;
        }

        .photo-box:active {
            transform: scale(0.94) rotate(2deg);
        }

        .hero-name {
            font-family: var(--font-display);
            font-size: 4.8rem;
            color: var(--violet-main);
            line-height: 0.8;
            text-transform: uppercase;
            letter-spacing: -4px;
            margin-bottom: 32px;
            opacity: 0;
            transform: translateY(40px);
            animation: entryEffect 1s var(--transition-smooth) 0.3s forwards;
        }

        .tag-block {
            display: inline-block;
            background-color: var(--neon-green);
            color: var(--violet-main);
            padding: 4px 10px;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            border-radius: 2px;
            margin: 2px 0;
        }

        .hero-bio {
            max-width: 320px;
            font-size: 1.1rem;
            opacity: 0;
            transform: translateY(30px);
            animation: entryEffect 1s var(--transition-smooth) 0.6s forwards;
        }

        @keyframes entryEffect {
            to { opacity: 1; transform: translateY(0) rotate(var(--rot, -4deg)); }
        }
        .hero-name, .hero-bio { --rot: 0deg; }
        .photo-box { --rot: -4deg; }

        /* 3. MENÚ FLOTANTE (FLOATING DOCK) */
        .floating-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px); /* Oculto por defecto abajo */
            z-index: 100;
            background-color: var(--violet-main);
            padding: 12px 24px;
            border-radius: 100px;
            display: flex;
            gap: 20px;
            box-shadow: 0 15px 35px rgba(77, 0, 153, 0.3);
            opacity: 0;
            transition: transform 0.6s var(--transition-smooth), opacity 0.4s ease;
            pointer-events: none; /* No clickable mientras esté oculto */
        }

        /* Clase activada por JS al hacer scroll */
        .floating-nav.is-visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .nav-item {
            text-decoration: none;
            color: var(--white);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .nav-item:active {
            color: var(--neon-green); /* Feedback táctil al tocar el link */
        }

        /* Divider entre ítems */
        .nav-item:not(:last-child)::after {
            content: '•';
            margin-left: 20px;
            color: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 375px) {
            .hero-name { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <!-- Marquesina -->
    <div class="marquee-bg">
        <div class="marquee-track">
            <span>CREATIVA DIGITAL • LUDMILA CORIA •&nbsp;</span>
            <span>CREATIVA DIGITAL • LUDMILA CORIA •&nbsp;</span>
            <span>CREATIVA DIGITAL • LUDMILA CORIA •&nbsp;</span>
            <span>CREATIVA DIGITAL • LUDMILA CORIA •&nbsp;</span>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="photo-box">
            <img src="https://via.placeholder.com/400x500/4d0099/ffffff?text=LUDMILA" alt="Ludmila Coria">
        </div>

        <h1 class="hero-name">Ludmila<br>Coria</h1>

        <p class="hero-bio">
            Estudiante de Diseño Gráfico, dedicada al 
            <span class="tag-block">Diseño Web UX/UI</span>, 
            <span class="tag-block">Branding</span> y 
            <span class="tag-block">Creación de Contenido</span> digital.
        </p>
    </section>

    <!-- Menú Flotante Interactivo -->
    <nav class="floating-nav" id="main-nav">
        <a href="#trabajos" class="nav-item">Trabajos</a>
        <a href="#info" class="nav-item">Info</a>
        <a href="#contacto" class="nav-item">Contacto</a>
    </nav>

    <script>
        // Lógica de Scroll para mostrar/ocultar el menú
        const nav = document.getElementById('main-nav');
        const scrollThreshold = 300; // Píxeles de scroll para que aparezca

        window.addEventListener('scroll', () => {
            if (window.scrollY > scrollThreshold) {
                nav.classList.add('is-visible');
            } else {
                nav.classList.remove('is-visible');
            }
        });
    </script>

</body>
</html>
