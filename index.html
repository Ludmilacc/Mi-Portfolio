<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludmila Coria | Portfolio</title>
    
    <!-- Tipografías: Plus Jakarta Sans (Google) + Cabinet Grotesk (Fontshare) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --white: #ffffff;
            --violet-strong: #4d0099; /* Violeta con mucha fuerza */
            --neon-green: #bdff00;    /* Verde Lima Neón */
            --violet-soft: rgba(77, 0, 153, 0.05); /* Violeta pastel muy sutil */
            --font-display: 'Cabinet Grotesk', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --curve: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--white);
            color: var(--violet-strong);
            font-family: var(--font-sans);
            overflow-x: hidden;
            /* Evita el rebote de scroll en iOS para una sensación más App */
            position: fixed; 
            width: 100%;
            height: 100%;
        }

        /* 1. MARQUESINA INFINITA (BACKGROUND LAYER) */
        .marquee-bg {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        .marquee-wrapper {
            display: flex;
            white-space: nowrap;
            font-family: var(--font-display);
            font-size: 20vw;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--violet-soft);
            will-change: transform;
            animation: moveMarquee 30s linear infinite;
        }

        @keyframes moveMarquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* 2. CONTENEDOR PRINCIPAL (MOBILE FIRST: 390x844px focus) */
        .hero-section {
            position: relative;
            z-index: 2;
            height: 100vh;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        /* FOTO ASIMÉTRICA E INTERACTIVA */
        .photo-frame {
            position: relative;
            width: 180px;
            height: 220px;
            margin-bottom: 32px;
            /* Forma orgánica asimétrica */
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            background: var(--neon-green);
            border: 2px solid var(--violet-strong);
            overflow: hidden;
            will-change: transform;
            transition: all 0.5s var(--curve);
            
            /* Animación de entrada */
            opacity: 0;
            transform: translateY(40px) rotate(-5deg);
            animation: entryUp 1.2s var(--curve) forwards;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            mix-blend-mode: multiply; /* Efecto artístico con el fondo verde */
            opacity: 0.9;
        }

        /* Efecto al presionar (Mobile Touch) */
        .photo-frame:active {
            transform: scale(0.95) rotate(8deg);
            border-radius: 50%;
            border-color: var(--neon-green);
            box-shadow: 0 0 40px rgba(189, 255, 0, 0.6);
        }

        /* BLOQUE DE TEXTO */
        .hero-content {
            width: 100%;
        }

        .name-title {
            font-family: var(--font-display);
            font-size: 4.2rem;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -3px;
            margin-bottom: 20px;
            
            opacity: 0;
            transform: translateY(30px);
            animation: entryUp 1s var(--curve) 0.3s forwards;
        }

        .name-title span {
            color: var(--neon-green);
            -webkit-text-stroke: 1.5px var(--violet-strong);
            display: block;
        }

        /* BADGE FLÚO */
        .role-tag {
            display: inline-block;
            background: var(--neon-green);
            color: var(--violet-strong);
            padding: 6px 14px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1.5px solid var(--violet-strong);
            border-radius: 50px;
            margin-bottom: 20px;
            
            opacity: 0;
            transform: translateY(20px);
            animation: entryUp 1s var(--curve) 0.5s forwards;
        }

        /* BIO */
        .bio-text {
            font-size: 1.1rem;
            line-height: 1.4;
            max-width: 310px;
            font-weight: 400;
            color: var(--violet-strong);
            
            opacity: 0;
            transform: translateY(20px);
            animation: entryUp 1s var(--curve) 0.7s forwards;
        }

        .bio-text strong {
            background: linear-gradient(0deg, var(--neon-green) 40%, transparent 40%);
            font-weight: 700;
        }

        /* ANIMACIONES */
        @keyframes entryUp {
            to {
                opacity: 1;
                transform: translateY(0) rotate(0);
            }
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-height: 700px) {
            .name-title { font-size: 3.5rem; }
            .photo-frame { width: 140px; height: 170px; }
        }
    </style>
</head>
<body>

    <!-- Capa 1: Marquesina de Proceso (Background) -->
    <div class="marquee-bg">
        <div class="marquee-wrapper">
            CREAR • INVESTIGAR • PROBAR • ENSUCIARSE • VIBRAR •&nbsp;
            CREAR • INVESTIGAR • PROBAR • ENSUCIARSE • VIBRAR •&nbsp;
        </div>
    </div>

    <!-- Capa 2: Contenido Hero -->
    <section class="hero-section">
        
        <!-- Foto con interacción táctil -->
        <div class="photo-frame">
            <!-- Tip: Para mejores resultados, usá una foto con fondo neutro -->
            <img src="https://via.placeholder.com/400x600/bdff00/4d0099?text=LUDMILA" alt="Ludmila Coria">
        </div>

        <div class="hero-content">
            <span class="role-tag">Diseño Web UX/UI • Branding</span>
            
            <h1 class="name-title">
                Ludmila<br>
                <span>Coria</span>
            </h1>

            <p class="bio-text">
                Estudiante de <strong>Diseño Gráfico</strong>, enfocada en crear productos digitales con alma y <strong>Contenido</strong> con impacto visual.
            </p>
        </div>

    </section>

</body>
</html>
