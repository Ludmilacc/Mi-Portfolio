<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludmila Coria | Portfolio</title>
    
    <!-- Tipografías: Plus Jakarta Sans (Google) + Cabinet Grotesk (Fontshare) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --white: #ffffff;
            --violet-main: #4d0099;     /* Violeta sólido y fuerte */
            --neon-green: #bdff00;      /* Verde Flúo */
            --violet-sutil: #f4f0fa;    /* Violeta clarito para marquesina */
            --font-display: 'Cabinet Grotesk', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition: cubic-bezier(0.2, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--white);
            color: var(--violet-main);
            font-family: var(--font-sans);
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* 1. MARQUESINA DE FONDO (SUTIL) */
        .marquee-container {
            position: fixed;
            top: 25%;
            left: 0;
            width: 100vw;
            z-index: 1;
            pointer-events: none;
        }

        .marquee-content {
            display: flex;
            white-space: nowrap;
            font-family: var(--font-display);
            font-size: 18vw;
            font-weight: 900;
            color: var(--violet-sutil);
            will-change: transform;
            animation: scroll 25s linear infinite;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* 2. ESTRUCTURA HERO */
        .hero {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 50px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* FOTO ASIMÉTRICA VIOLETA */
        .photo-container {
            position: relative;
            width: 190px;
            height: 230px;
            margin-bottom: 40px;
            background: var(--violet-main);
            border-radius: 40px 100px 40px 80px; /* Asimetría limpia */
            overflow: hidden;
            transform: rotate(-3deg);
            will-change: transform;
            transition: transform 0.4s var(--transition);
            
            /* Animación de entrada */
            opacity: 0;
            animation: fadeInStack 1s var(--transition) forwards;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Podés usar un filtro para que combine mejor con el violeta */
            filter: grayscale(100%) contrast(110%);
            opacity: 0.8;
        }

        /* Interacción Táctil */
        .photo-container:active {
            transform: scale(0.95) rotate(2deg);
        }

        /* NOMBRE LIMPIO Y SÓLIDO */
        .name {
            font-family: var(--font-display);
            font-size: 4.5rem;
            color: var(--violet-main);
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -4px;
            margin-bottom: 30px;
            
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInStack 1s var(--transition) 0.3s forwards;
        }

        /* BLOQUES DE COLOR (RESALTADOS) */
        .highlight-block {
            display: inline-block;
            background-color: var(--neon-green);
            color: var(--violet-main);
            padding: 4px 10px;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0;
            margin: 2px 0;
            /* Cuadrado limpio con puntas apenas redondeadas para que no sea tosco */
            border-radius: 2px; 
        }

        /* BIOGRAFÍA */
        .bio {
            max-width: 330px;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--violet-main);
            
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInStack 1s var(--transition) 0.6s forwards;
        }

        /* ANIMACIÓN DE ENTRADA ÚNICA */
        @keyframes fadeInStack {
            to {
                opacity: 1;
                transform: translateY(0) rotate(var(--rot, -3deg)); /* Mantiene rotación en foto */
            }
        }

        /* Reset para que el nombre no herede la rotación de la foto en la animación */
        .name, .bio { --rot: 0deg; }
        .photo-container { --rot: -3deg; }

        /* Mobile Optimization */
        @media (max-width: 375px) {
            .name { font-size: 3.8rem; }
        }
    </style>
</head>
<body>

    <!-- Capa de Fondo: Marquesina -->
    <div class="marquee-container">
        <div class="marquee-content">
            <span>CREAR • INVESTIGAR • PROBAR • ENSUCIARSE • VIBRAR •&nbsp;</span>
            <span>CREAR • INVESTIGAR • PROBAR • ENSUCIARSE • VIBRAR •&nbsp;</span>
        </div>
    </div>

    <!-- Contenido Principal -->
    <section class="hero">
        
        <!-- Contenedor Foto -->
        <div class="photo-container">
            <!-- Reemplazar con tu imagen real -->
            <img src="https://via.placeholder.com/400x500/4d0099/ffffff?text=LUDMILA" alt="Ludmila Coria">
        </div>

        <!-- Nombre -->
        <h1 class="name">Ludmila<br>Coria</h1>

        <!-- Bio con bloques de color -->
        <p class="bio">
            Estudiante de Diseño Gráfico, dedicada al 
            <span class="highlight-block">Diseño Web UX/UI</span>, 
            <span class="highlight-block">Branding</span> y 
            <span class="highlight-block">Creación de Contenido</span> digital con enfoque estratégico.
        </p>

    </section>

</body>
</html>
